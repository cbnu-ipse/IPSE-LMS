services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ipse -d ipse_lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/jjjjjjong/ipse-lms:latest  # CI/CD: GHCR에서 pull. 로컬은 아래 build 사용
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "8000"

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    # 호스트 포트 개방 불필요 — cloudflared가 내부 네트워크로 직접 연결
    expose:
      - "80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - media_data:/app/media:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - web

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env.docker   # TUNNEL_TOKEN 을 여기서 읽음
    depends_on:
      - nginx

volumes:
  postgres_data:
  media_data:
  static_data:
