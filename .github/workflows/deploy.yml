name: CI/CD

# ┌──────────────────────────────────────────────────────────────────┐
# │  보안 설계 원칙                                                    │
# │  - test/build : GitHub-hosted runner (ubuntu) → 외부 코드 실행 안전│
# │  - deploy     : self-hosted runner (Windows 서버)                 │
# │    → push to main 에만 트리거 (fork PR 실행 불가)                  │
# │    → 소스 컴파일/pip install 없이 GHCR 이미지 pull만 수행           │
# │    → environment: production 으로 추가 승인 게이트 설정 가능        │
# └──────────────────────────────────────────────────────────────────┘

on:
  push:
    branches: [main]
  workflow_dispatch:   # 수동 배포 허용

env:
  IMAGE: ghcr.io/jjjjjjong/ipse-lms

jobs:
  # ── 1. 테스트 (GitHub-hosted) ──────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements/base.txt

      - name: Django system check
        env:
          SECRET_KEY: ci-only-dummy-secret-key-not-used-in-production
          DEBUG: 'True'
          DJANGO_SETTINGS_MODULE: config.settings
          DATABASE_URL: sqlite:///test.db
        run: python manage.py check

  # ── 2. 이미지 빌드 & GHCR 푸시 (GitHub-hosted) ────────────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # GitHub Actions 캐시 — 빌드 속도 최적화
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. 서버 배포 (self-hosted Windows) ────────────────────────────
  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build
    # GitHub 저장소 Settings → Environments → production 을 생성하면
    # 여기서 "Required reviewers" 설정으로 수동 승인 게이트 추가 가능
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          # .env.docker 를 워크스페이스에 유지 (docker compose restart 대비)
          clean: false

      - name: Write env file
        shell: bash
        env:
          ENV_DOCKER: ${{ secrets.ENV_DOCKER }}
        run: |
          printf '%s\n' "$ENV_DOCKER" > .env.docker
          # Windows Git Bash 에서 chmod 는 무시되지만 명시적으로 기록
          chmod 600 .env.docker 2>/dev/null || true

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull latest image
        shell: bash
        run: docker compose pull web

      - name: Deploy
        shell: bash
        run: docker compose up -d --remove-orphans

      - name: Remove dangling images
        shell: bash
        run: docker image prune -f
