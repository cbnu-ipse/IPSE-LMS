upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # Cloudflare Tunnel: 실제 클라이언트 IP 복원
    # cloudflared → nginx 구간은 Docker 내부망이므로 전체 신뢰
    real_ip_header CF-Connecting-IP;
    set_real_ip_from 0.0.0.0/0;

    client_max_body_size 20M;

    # 정적 파일 — nginx가 직접 서빙 (gunicorn 거치지 않음)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # 미디어 파일 (사용자 업로드)
    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Django 앱으로 프록시
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;  # CF-Connecting-IP 복원 결과
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Cloudflare가 설정한 X-Forwarded-Proto 를 그대로 전달 (https 유지)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_redirect off;
    }
}
