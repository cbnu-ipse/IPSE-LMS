{% extends 'base.html' %}
{% block title %}투표 만들기 - IPSE{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-6 py-10">

    <a href="{% url 'poll_list' %}" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-emerald-600 transition mb-6">
        <i class="fa-solid fa-arrow-left text-xs"></i> 투표 목록
    </a>

    <!-- 메시지 -->
    {% if messages %}
    <div class="mb-4 space-y-2">
        {% for message in messages %}
        <div class="px-4 py-3 rounded-xl text-sm font-medium
            {% if message.tags == 'success' %}bg-emerald-50 text-emerald-700 border border-emerald-200
            {% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}

    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8">
        <h1 class="text-xl font-bold text-slate-800 mb-6">새 투표 만들기</h1>

        <form method="post" id="poll-form">
            {% csrf_token %}

            <!-- 제목 -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">제목 <span class="text-red-400">*</span></label>
                <input type="text" name="title" required maxlength="200" placeholder="투표 제목을 입력하세요"
                       class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition">
            </div>

            <!-- 설명 -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">설명 (선택)</label>
                <textarea name="description" rows="2" placeholder="투표에 대한 설명을 입력하세요"
                          class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm resize-none focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition"></textarea>
            </div>

            <!-- 선택 항목 -->
            <div class="mb-5">
                <label class="block text-sm font-semibold text-slate-700 mb-2">
                    선택 항목 <span class="text-red-400">*</span>
                    <span class="text-slate-400 font-normal text-xs ml-1">(최소 2개)</span>
                </label>
                <div id="choices-container" class="space-y-2 mb-3">
                    <div class="choice-row flex items-center gap-2">
                        <input type="text" name="choices" placeholder="항목 1" required
                               class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition">
                        <button type="button" onclick="removeChoice(this)"
                                class="text-slate-300 hover:text-red-400 transition p-1 shrink-0" tabindex="-1">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                    <div class="choice-row flex items-center gap-2">
                        <input type="text" name="choices" placeholder="항목 2" required
                               class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition">
                        <button type="button" onclick="removeChoice(this)"
                                class="text-slate-300 hover:text-red-400 transition p-1 shrink-0" tabindex="-1">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                </div>
                <button type="button" id="add-choice-btn"
                        class="inline-flex items-center gap-1.5 text-sm text-emerald-600 font-semibold hover:text-emerald-700 transition">
                    <i class="fa-solid fa-plus text-xs"></i> 항목 추가
                </button>
            </div>

            <!-- 옵션 -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5">
                <label class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition">
                    <input type="checkbox" name="is_multiple" class="accent-emerald-600 w-4 h-4">
                    <div>
                        <p class="text-sm font-semibold text-slate-700">복수 선택 허용</p>
                        <p class="text-xs text-slate-400">여러 항목에 투표 가능</p>
                    </div>
                </label>
                <label class="flex items-center gap-3 px-4 py-3 rounded-xl border border-slate-200 cursor-pointer hover:bg-slate-50 transition">
                    <input type="checkbox" name="is_anonymous" class="accent-emerald-600 w-4 h-4">
                    <div>
                        <p class="text-sm font-semibold text-slate-700">익명 투표</p>
                        <p class="text-xs text-slate-400">투표자 정보를 숨김</p>
                    </div>
                </label>
            </div>

            <!-- 마감 일시 -->
            <div class="mb-7">
                <label class="block text-sm font-semibold text-slate-700 mb-1.5">마감 일시 (선택)</label>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">날짜</label>
                        <input type="date" name="ends_at_date"
                               class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition">
                    </div>
                    <div>
                        <label class="block text-xs text-slate-400 mb-1">시간</label>
                        <input type="time" name="ends_at_time"
                               class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition">
                    </div>
                </div>
                <p class="text-xs text-slate-400 mt-1.5">날짜만 입력 시 해당일 23:59에 마감됩니다.</p>
            </div>

            <!-- 버튼 -->
            <div class="flex gap-3">
                <a href="{% url 'poll_list' %}"
                   class="flex-1 text-center py-3 rounded-xl text-sm font-semibold border border-slate-200 text-slate-600 hover:bg-slate-50 transition">
                    취소
                </a>
                <button type="submit"
                        class="flex-1 bg-emerald-600 text-white py-3 rounded-xl text-sm font-semibold hover:bg-emerald-700 transition shadow-sm">
                    투표 만들기
                </button>
            </div>
        </form>
    </div>
</section>

<script>
(function () {
    let choiceCount = 2;

    document.getElementById('add-choice-btn').addEventListener('click', function () {
        choiceCount++;
        const container = document.getElementById('choices-container');
        const row = document.createElement('div');
        row.className = 'choice-row flex items-center gap-2';
        row.innerHTML = `
            <input type="text" name="choices" placeholder="항목 ${choiceCount}"
                   class="flex-1 px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition">
            <button type="button" onclick="removeChoice(this)"
                    class="text-slate-300 hover:text-red-400 transition p-1 shrink-0" tabindex="-1">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;
        container.appendChild(row);
    });

    window.removeChoice = function (btn) {
        const rows = document.querySelectorAll('.choice-row');
        if (rows.length <= 2) return; // 최소 2개 유지
        btn.closest('.choice-row').remove();
    };
})();
</script>
{% endblock %}
