{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오프라인 | IPSE LMS</title>
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
  <link rel="icon" type="image/svg+xml" href="{% static 'img/favicon-ipse.svg' %}">
</head>
<body class="bg-gradient-to-b from-slate-50 to-white min-h-screen flex flex-col items-center justify-center text-center px-6">
  <div class="max-w-sm space-y-6">
    <div class="w-20 h-20 mx-auto bg-emerald-100 rounded-full flex items-center justify-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-10 h-10 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 15a4 4 0 004 4h10a4 4 0 001.998-7.464A6 6 0 006.007 9H6a4 4 0 00-3 6.708" />
        <line x1="12" y1="12" x2="12" y2="18" stroke-linecap="round"/>
        <line x1="9" y1="15" x2="15" y2="15" stroke-linecap="round"/>
      </svg>
    </div>
    <div>
      <h1 class="text-2xl font-semibold text-slate-800">오프라인 상태입니다</h1>
      <p class="mt-2 text-sm text-slate-500">인터넷 연결을 확인한 후 다시 시도해 주세요.</p>
    </div>
    <button onclick="location.reload()"
            class="inline-flex items-center gap-2 bg-emerald-600 text-white px-6 py-2.5 rounded-xl text-sm font-semibold hover:bg-emerald-700 transition shadow-sm">
      다시 시도
    </button>
    <a href="/" class="block text-xs text-slate-400 hover:text-emerald-600 transition">홈으로 돌아가기</a>
  </div>
</body>
</html>
