{% extends 'base.html' %}
{% load i18n %}
{% block title %}{{ title }} | {% trans 'Learning management system' %}{% endblock title %}

{% block content %}

<section class="max-w-7xl mx-auto px-6 py-10">
    <div class="space-y-8">
        <div class="bg-white border border-slate-200 rounded-md p-8 shadow-sm">
            <h1 class="text-4xl font-semibold text-[#3F3F3F]">{{ title }}</h1>
        </div>

        <div class="bg-white border border-slate-200 rounded-md p-8 shadow-sm max-w-xl">
            <p class="text-slate-700 text-lg mb-6">
                <strong>{{ object_name }}</strong>{% trans ' 계정을 정말로 삭제하시겠습니까? 이 작업은 취소할 수 없습니다.' %}
            </p>
            <form method="POST" class="flex gap-3">
                {% csrf_token %}
                <button type="submit" class="inline-flex items-center justify-center px-6 py-3 rounded-md bg-rose-600 text-white text-sm font-semibold hover:bg-rose-700 transition">
                    {% trans '삭제 확인' %}
                </button>
                <a href="{% url cancel_url %}" class="inline-flex items-center justify-center px-6 py-3 rounded-md bg-white border border-slate-200 text-slate-700 text-sm font-semibold hover:bg-slate-50 transition">
                    {% trans '취소' %}
                </a>
            </form>
        </div>
    </div>
</section>

{% endblock content %}
